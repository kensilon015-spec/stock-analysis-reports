<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天機錄 — 推衍結果典藏</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Noto Sans TC 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 全域配色（深色系，中低彩度）===== */
        :root {
            --bg-main: #2c2c2c;
            --bg-panel: #3a3a3a;
            --bg-card: #444444;
            --text-primary: #e0ddd5;
            --text-secondary: #b0aba0;
            --accent-gold: #c4a96a;
            --accent-purple: #a08bc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ===== Banner 區域 ===== */
        .banner {
            background: linear-gradient(135deg, var(--bg-panel) 0%, #2a2535 50%, var(--bg-panel) 100%);
            border-bottom: 2px solid var(--accent-purple);
            padding: 2.5rem 0;
            text-align: center;
        }

        .banner h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px;
        }

        .banner .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* ===== 主內容區 ===== */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* 簡介面板 */
        .intro-panel {
            background-color: var(--bg-panel);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--accent-gold);
        }

        .intro-panel p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
            margin: 0;
        }

        /* 佔位卡片 */
        .placeholder-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px dashed var(--text-secondary);
        }

        .placeholder-card .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .placeholder-card .message {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ===== 底部導覽 ===== */
        .bottom-nav {
            max-width: 900px;
            margin: 1rem auto 2rem;
            padding: 0 1rem;
            text-align: center;
        }

        .bottom-nav a {
            display: inline-block;
            color: var(--accent-purple);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--accent-purple);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .bottom-nav a:hover {
            background-color: var(--accent-purple);
            color: var(--bg-main);
        }

        /* ===== 響應式 ===== */
        @media (max-width: 576px) {
            .banner h1 {
                font-size: 1.5rem;
            }

            .intro-panel {
                padding: 1rem 1.2rem;
            }

            .placeholder-card {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <header class="banner">
        <h1>🔮 天機錄 — 推衍結果典藏</h1>
        <p class="subtitle">Divination Archives</p>
    </header>

    <!-- 主內容 -->
    <main class="main-content">

        <!-- 簡介面板 -->
        <section class="intro-panel">
            <p>收納所有推衍部門產出的報告，記錄每次推衍的結論與預測。</p>
        </section>

        <!-- 推衍報告列表（佔位） -->
        <section class="placeholder-card">
            <div class="icon">📂</div>
            <p class="message">尚無推衍報告</p>
        </section>

    </main>

    <!-- 底部導覽 -->
    <nav class="bottom-nav">
        <a href="../天機閣總索引.html">← 返回天機閣總索引</a>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
