<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推衍命中率儀表板 — 天機閣</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #2c2c2c;
            --bg-panel: #3a3a3a;
            --bg-card: #444444;
            --text-primary: #e0ddd5;
            --text-secondary: #b0aba0;
            --color-gold: #c4a96a;
            --color-blue: #7bafc4;
            --color-green: #7db88a;
            --color-red: #c47b7b;
            --color-purple: #a08bc4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 導航列 */
        .nav-bar {
            background: var(--bg-panel);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #555;
            flex-wrap: wrap;
        }
        .nav-bar a {
            color: var(--color-gold);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .nav-bar a:hover { color: #e0ddd5; }
        .nav-bar .sep { color: #666; }

        /* 標題 */
        .page-header {
            text-align: center;
            padding: 32px 24px 16px;
        }
        .page-header h1 {
            color: var(--color-gold);
            font-size: 1.6rem;
            font-weight: 700;
        }
        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* KPI 卡片 */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            padding: 0 24px;
            max-width: 700px;
            margin: 16px auto;
        }
        .kpi-card {
            background: var(--bg-panel);
            border-radius: 10px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid #555;
        }
        .kpi-card .kpi-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--color-gold);
        }
        .kpi-card .kpi-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 區塊容器 */
        .section {
            background: var(--bg-panel);
            border-radius: 10px;
            margin: 16px 24px;
            padding: 20px;
            border: 1px solid #555;
        }
        .section h2 {
            color: var(--color-gold);
            font-size: 1.05rem;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #555;
        }

        /* 預測時間表 */
        .prediction-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #444;
            font-size: 0.85rem;
        }
        .prediction-item:last-child { border-bottom: none; }
        .pred-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .pred-dot.red { background: var(--color-red); }
        .pred-dot.yellow { background: #e0c87a; }
        .pred-dot.green { background: var(--color-green); }
        .pred-id {
            color: var(--text-secondary);
            font-size: 0.75rem;
            min-width: 90px;
        }
        .pred-content { flex: 1; color: var(--text-primary); }
        .pred-target {
            color: var(--color-blue);
            font-size: 0.8rem;
            min-width: 70px;
        }
        .pred-deadline {
            text-align: right;
            min-width: 90px;
            font-size: 0.8rem;
        }
        .pred-days {
            font-weight: 700;
            font-size: 0.75rem;
        }

        /* 雙欄 */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 700px) {
            .two-col { grid-template-columns: 1fr; }
        }

        /* 長條圖（純 CSS） */
        .bar-chart { margin-top: 8px; }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        .bar-label {
            min-width: 80px;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .bar-track {
            flex: 1;
            background: #555;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--color-gold);
            display: flex;
            align-items: center;
            padding-left: 6px;
            font-size: 0.7rem;
            color: #2c2c2c;
            font-weight: 700;
            transition: width 0.6s ease;
        }

        /* 空狀態 */
        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        /* 頁尾 */
        .footer {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            padding: 24px;
            border-top: 1px solid #444;
            margin-top: 24px;
        }

        /* 載入狀態 */
        .loading {
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<!-- 導航列 -->
<div class="nav-bar">
    <a href="../天機閣總索引.html"><i class="bi bi-house-door"></i> 天機閣總索引</a>
    <span class="sep">|</span>
    <a href="天機錄索引.html"><i class="bi bi-book"></i> 天機錄</a>
    <span class="sep">|</span>
    <span style="color:var(--text-secondary);font-size:0.85rem;"><i class="bi bi-speedometer2"></i> 推衍命中率儀表板</span>
</div>

<!-- 標題 -->
<div class="page-header">
    <h1><i class="bi bi-speedometer2"></i> 推衍命中率儀表板</h1>
    <div class="subtitle" id="updateTime">載入中...</div>
</div>

<!-- KPI 卡片 -->
<div class="kpi-row">
    <div class="kpi-card">
        <div class="kpi-value" id="kpiPending">—</div>
        <div class="kpi-label">待驗證</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-value" id="kpiVerified">—</div>
        <div class="kpi-label">已驗證</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-value" id="kpiHitRate">—</div>
        <div class="kpi-label">命中率</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-value" id="kpiConfidence">—</div>
        <div class="kpi-label">平均信心度</div>
    </div>
</div>

<!-- 待驗證預測時間表 -->
<div class="section">
    <h2><i class="bi bi-calendar-event"></i> 待驗證預測時間表</h2>
    <div id="predictionTimeline">
        <div class="loading">載入中...</div>
    </div>
</div>

<!-- 經驗庫 + 避坑清單 -->
<div style="margin:0 24px;">
    <div class="two-col">
        <div class="section" style="margin:0;">
            <h2 style="color:var(--color-green);"><i class="bi bi-check-circle"></i> 經驗庫</h2>
            <div id="experiencePanel">
                <div class="loading">載入中...</div>
            </div>
        </div>
        <div class="section" style="margin:0;">
            <h2 style="color:var(--color-red);"><i class="bi bi-exclamation-triangle"></i> 避坑清單</h2>
            <div id="pitfallPanel">
                <div class="loading">載入中...</div>
            </div>
        </div>
    </div>
</div>

<!-- 信心度分佈 -->
<div class="section">
    <h2><i class="bi bi-bar-chart"></i> 信心度分佈</h2>
    <div id="confidenceChart" class="bar-chart">
        <div class="loading">載入中...</div>
    </div>
</div>

<!-- 標的分佈 -->
<div class="section">
    <h2><i class="bi bi-pie-chart"></i> 標的分佈</h2>
    <div id="targetChart" class="bar-chart">
        <div class="loading">載入中...</div>
    </div>
</div>

<div style="text-align:center; margin:2rem 0;">
    <a href="推衍能力自我報告.html" style="display:inline-block; padding:12px 28px; background:linear-gradient(135deg, #c4a96a, #a08040); color:#1a1410; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.95rem; transition:transform 0.2s, box-shadow 0.2s;">
        <i class="bi bi-clipboard-data"></i> 查看完整推衍自我報告
    </a>
</div>

<div class="footer">
    天機閣推衍命中率儀表板 — 資料來源：推衍驗證追蹤.json / 推衍經驗庫.json / 推衍避坑清單.json
</div>

<script>
// === 資料路徑設定 ===
const JSON_PATHS = {
    tracking: '../../天機閣-設定/推衍驗證追蹤.json',
    experience: '../../天機閣-設定/推衍經驗庫.json',
    pitfalls: '../../天機閣-設定/推衍避坑清單.json'
};
const API_URL = 'http://localhost:5000/api/deduction/stats';

// === 載入資料 ===
async function loadData() {
    let data = null;

    // 優先嘗試 API
    try {
        const resp = await fetch(API_URL, { signal: AbortSignal.timeout(3000) });
        if (resp.ok) {
            data = await resp.json();
            renderFromAPI(data);
            return;
        }
    } catch (e) {
        console.log('API 不可用，改用本地 JSON');
    }

    // Fallback：直接讀取 JSON 檔案
    try {
        const [trackResp, expResp, pitResp] = await Promise.all([
            fetch(JSON_PATHS.tracking),
            fetch(JSON_PATHS.experience),
            fetch(JSON_PATHS.pitfalls)
        ]);
        const tracking = await trackResp.json();
        const experience = await expResp.json();
        const pitfalls = await pitResp.json();
        renderFromJSON(tracking, experience, pitfalls);
    } catch (e) {
        console.error('JSON 載入失敗：', e);
        document.getElementById('updateTime').textContent = '資料載入失敗，請確認 JSON 檔案路徑';
    }
}

// === 從 API 渲染 ===
function renderFromAPI(data) {
    document.getElementById('kpiPending').textContent = data['待驗證'] || 0;
    document.getElementById('kpiVerified').textContent = data['已驗證'] || 0;
    document.getElementById('kpiHitRate').textContent = data['命中率'] !== null ? data['命中率'] + '%' : '—';
    document.getElementById('kpiConfidence').textContent = data['平均信心度'] || 0;
    document.getElementById('updateTime').textContent = '資料來源：API（即時）';

    const items = data['預測明細'] || [];
    renderTimeline(items);
    renderConfidenceChart(items);
    renderTargetChart(items);

    renderExperiencePanel(data['經驗庫筆數'] || 0);
    renderPitfallPanel(data['避坑清單筆數'] || 0);
}

// === 從本地 JSON 渲染 ===
function renderFromJSON(tracking, experience, pitfalls) {
    const items = tracking['驗證追蹤'] || [];
    const stats = tracking['統計'] || {};
    const expItems = experience['成功經驗'] || [];
    const pitItems = pitfalls['失敗教訓'] || [];

    const pending = items.filter(i => i['狀態'] === '待驗證');
    const verified = items.filter(i => i['狀態'] === '已驗證');
    const accurate = verified.filter(i => ['準確', '部分準確'].includes(i['驗證結果']));
    const hitRate = verified.length > 0 ? Math.round(accurate.length / verified.length * 100) : null;
    const avgConf = items.length > 0 ? Math.round(items.reduce((s, i) => s + (i['信心度'] || 0), 0) / items.length) : 0;

    document.getElementById('kpiPending').textContent = pending.length;
    document.getElementById('kpiVerified').textContent = verified.length;
    document.getElementById('kpiHitRate').textContent = hitRate !== null ? hitRate + '%' : '—';
    document.getElementById('kpiConfidence').textContent = avgConf;
    document.getElementById('updateTime').textContent = `最後更新：${tracking['最後更新'] || '未知'}（本地 JSON）`;

    renderTimeline(items);
    renderConfidenceChart(items);
    renderTargetChart(items);

    renderExperiencePanel(expItems.length, expItems);
    renderPitfallPanel(pitItems.length, pitItems);
}

// === 渲染預測時間表 ===
function renderTimeline(items) {
    const container = document.getElementById('predictionTimeline');
    const pending = items.filter(i => i['狀態'] === '待驗證');

    if (pending.length === 0) {
        container.innerHTML = '<div class="empty-state">目前沒有待驗證的預測</div>';
        return;
    }

    // 按驗證期限排序
    pending.sort((a, b) => new Date(a['驗證期限']) - new Date(b['驗證期限']));

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let html = '';
    for (const item of pending) {
        const deadline = new Date(item['驗證期限']);
        const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

        let dotClass = 'green';
        let dayColor = '#7db88a';
        if (daysLeft <= 14) {
            dotClass = 'red';
            dayColor = '#c47b7b';
        } else if (daysLeft <= 30) {
            dotClass = 'yellow';
            dayColor = '#e0c87a';
        }

        html += `
        <div class="prediction-item">
            <div class="pred-dot ${dotClass}"></div>
            <div class="pred-id">${item['追蹤ID']}</div>
            <div class="pred-target">${item['標的']}</div>
            <div class="pred-content">${item['預測內容']}</div>
            <div class="pred-deadline">
                ${item['驗證期限']}
                <div class="pred-days" style="color:${dayColor};">${daysLeft > 0 ? daysLeft + ' 天後' : '已到期'}</div>
            </div>
        </div>`;
    }

    container.innerHTML = html;
}

// === 渲染信心度分佈 ===
function renderConfidenceChart(items) {
    const container = document.getElementById('confidenceChart');
    if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">無資料</div>';
        return;
    }

    // 分組：40-49, 50-59, 60-69, 70-79, 80+
    const bins = [
        { label: '40-49', min: 40, max: 49, count: 0, color: '#c47b7b' },
        { label: '50-59', min: 50, max: 59, count: 0, color: '#e0c87a' },
        { label: '60-69', min: 60, max: 69, count: 0, color: '#c4a96a' },
        { label: '70-79', min: 70, max: 79, count: 0, color: '#7db88a' },
        { label: '80+',   min: 80, max: 100, count: 0, color: '#7bafc4' }
    ];

    for (const item of items) {
        const conf = item['信心度'] || 0;
        for (const bin of bins) {
            if (conf >= bin.min && conf <= bin.max) {
                bin.count++;
                break;
            }
        }
    }

    const maxCount = Math.max(...bins.map(b => b.count), 1);
    let html = '';
    for (const bin of bins) {
        const pct = Math.round(bin.count / maxCount * 100);
        html += `
        <div class="bar-row">
            <div class="bar-label">${bin.label}</div>
            <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${bin.color};">${bin.count > 0 ? bin.count + ' 筆' : ''}</div>
            </div>
        </div>`;
    }

    container.innerHTML = html;
}

// === 渲染標的分佈 ===
function renderTargetChart(items) {
    const container = document.getElementById('targetChart');
    if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">無資料</div>';
        return;
    }

    const groups = {};
    for (const item of items) {
        const target = item['標的'] || '未知';
        groups[target] = (groups[target] || 0) + 1;
    }

    const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]);
    const maxCount = Math.max(...sorted.map(e => e[1]), 1);
    const colors = ['#c4a96a', '#7bafc4', '#7db88a', '#a08bc4', '#c47b7b'];

    let html = '';
    sorted.forEach(([target, count], idx) => {
        const pct = Math.round(count / maxCount * 100);
        const color = colors[idx % colors.length];
        html += `
        <div class="bar-row">
            <div class="bar-label">${target}</div>
            <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color};">${count} 筆</div>
            </div>
        </div>`;
    });

    container.innerHTML = html;
}

// === 渲染經驗庫面板 ===
function renderExperiencePanel(count, items) {
    const container = document.getElementById('experiencePanel');
    if (count === 0) {
        container.innerHTML = '<div class="empty-state">目前 0 筆<br><small style="color:#666;">首筆驗證成功後將自動顯示</small></div>';
        return;
    }

    let html = `<div style="color:var(--color-green);font-size:0.9rem;margin-bottom:8px;">共 ${count} 筆成功經驗</div>`;
    if (items && items.length > 0) {
        for (const exp of items.slice(0, 5)) {
            html += `<div style="font-size:0.8rem;color:var(--text-secondary);padding:4px 0;border-bottom:1px solid #444;">`;
            html += `<strong style="color:var(--text-primary);">${exp['標的'] || ''}</strong>：${exp['預測內容'] || ''}`;
            html += `<br><span style="color:var(--color-green);">可複用模式：${exp['可複用模式'] || '—'}</span>`;
            html += `</div>`;
        }
        if (items.length > 5) {
            html += `<div style="color:#666;font-size:0.75rem;text-align:center;padding:4px;">...還有 ${items.length - 5} 筆</div>`;
        }
    }
    container.innerHTML = html;
}

// === 渲染避坑清單面板 ===
function renderPitfallPanel(count, items) {
    const container = document.getElementById('pitfallPanel');
    if (count === 0) {
        container.innerHTML = '<div class="empty-state">目前 0 筆<br><small style="color:#666;">首筆驗證失準後將自動顯示</small></div>';
        return;
    }

    let html = `<div style="color:var(--color-red);font-size:0.9rem;margin-bottom:8px;">共 ${count} 筆失敗教訓</div>`;
    if (items && items.length > 0) {
        for (const pit of items.slice(0, 5)) {
            html += `<div style="font-size:0.8rem;color:var(--text-secondary);padding:4px 0;border-bottom:1px solid #444;">`;
            html += `<strong style="color:var(--text-primary);">${pit['標的'] || ''}</strong>：${pit['預測內容'] || ''}`;
            html += `<br><span style="color:var(--color-red);">偏差模式：${pit['偏差模式'] || '—'}</span>`;
            html += `</div>`;
        }
        if (items.length > 5) {
            html += `<div style="color:#666;font-size:0.75rem;text-align:center;padding:4px;">...還有 ${items.length - 5} 筆</div>`;
        }
    }
    container.innerHTML = html;
}

// === 啟動 ===
document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
